name: Update Widget Feeds

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate feeds
        run: python3 generate_feed.py

      - name: Commit updated data
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add data/*.json
          git diff --quiet --cached || git commit -m "Update widget feeds [skip ci]"
          git pull --rebase --autostash
          git push
